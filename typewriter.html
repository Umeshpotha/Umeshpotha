<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter Effect</title>
    <style>
        #typewriter-text {
            white-space: pre;
            overflow: hidden;
            border-right: .15em solid orange;
            font-size: 24px;
            font-family: monospace;
            animation: typing 3s steps(40) infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
    </style>
</head>
<body>
    <div id="typewriter-text">
        👋 Hello, I'm Umesh, a Passionate tech Enthusiast from India.<br>I am actively looking for Internships Across India.<br>My interests are in Data Science, ML, GENAI, LLMs.
    </div>
</body>
</html>
